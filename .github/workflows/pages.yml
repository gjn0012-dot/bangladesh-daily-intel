name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Cache open-source translation model
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: m2m100-418m-transformersjs-v1
      - name: Fetch latest public news feeds
        run: npm run fetch:news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6' }}
          AI_STORY_LIMIT: "20"
          LOCAL_TRANSLATION: "1"
          LOCAL_TRANSLATION_LIMIT: "80"
          NEWS_MAX_AGE_DAYS: "30"
          NEWS_MAX_STORIES: "80"
          HF_HOME: ".cache/huggingface"
      - name: Build static website
        run: npm run github:build
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_BASE_PATH: "/bangladesh-daily-intel"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
